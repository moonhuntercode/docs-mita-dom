<div class="dashboard-container">
    <header class="dashboard-header">
        <h2>🛡️ Telemetry & Health Dashboard</h2>
        <div class="dashboard-controls">
            <button id="btn-filter-all" class="btn-filter active">Todos</button>
            <button id="btn-filter-error" class="btn-filter error">Errores</button>
            <button id="btn-filter-warn" class="btn-filter warn">Advertencias</button>
            <button id="btn-filter-info" class="btn-filter info">Info / Health</button>
            <button id="btn-clear" class="btn-clear">🗑️ Limpiar</button>
        </div>
    </header>

    <div class="logs-container">
        <ul id="logs-list" class="logs-list">
            <!-- Los logs se inyectarán aquí -->
        </ul>
    </div>
</div>
