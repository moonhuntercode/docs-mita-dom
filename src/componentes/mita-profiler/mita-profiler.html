<div id="profiler-widget" class="profiler-container">
  <div class="profiler-header">
    <span class="profiler-title">⚡ Mita Profiler</span>
    <button id="btn-toggle-profiler" class="profiler-btn" aria-label="Ocultar Profiler">🙈 Ocultar</button>
  </div>
  <div id="profiler-body" class="profiler-body">
    <div class="profiler-config">
      <label>Umbral Lento (Rojo): 
        <input type="number" id="input-rojo" step="0.1" title="Milisegundos para considerar lento"> ms
      </label>
    </div>
    <ul id="profiler-list" class="profiler-list">
      <!-- Los items se inyectan aquí -->
    </ul>
  </div>
</div>
